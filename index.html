<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Generative Records</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
<div class="brand">
<img src="assets/logo.svg">
<div>
<h1>GENERATIVE RECORDS</h1>
<p>Sounds from the unknown</p>
</div>
</div>

<nav>
<a href="#home">Home</a>
<a href="#artists">Artists</a>
<a href="#releases">Releases</a>
<a href="#posts">Posts</a>
</nav>
</header>

<section class="panel hero" id="home">
<div class="feature" style="background-image:url('assets/atrisk.svg')">
<div class="feature-inner">
<h2>ATRISK</h2>
<button onclick="openPlayer('https://open.spotify.com/embed/album/4GzM8r8M8ExampleA')">Listen</button>
</div>
</div>

<div class="feature" style="background-image:url('assets/pixels.svg')">
<div class="feature-inner">
<h2>THE PIXELS</h2>
<button onclick="openPlayer('https://open.spotify.com/embed/album/3PxL8s9R9ExampleB')">Listen</button>
</div>
</div>
</section>

<section class="panel" id="artists">
<h2>Artists</h2>
<div class="grid" id="artistGrid"></div>
</section>

<section class="panel" id="releases">
<h2>Releases</h2>
<div class="grid" id="releaseGrid"></div>
</section>

<section class="panel" id="posts">
<h2>Latest Posts</h2>
<div class="grid" id="postsGrid"></div>
</section>

<div id="playerModal" class="modal">
<div class="modal-inner">
<span class="close" onclick="closePlayer()">×</span>
<iframe id="spotifyFrame"></iframe>
</div>
</div>

<script src="app.js"></script>
</body>
</html>
